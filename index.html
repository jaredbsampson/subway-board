<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Subway Departures</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ---------- THEME TOKENS ---------- */
  :root {
    --paper:        #f1ead8;
    --paper-2:      #ebe2c8;
    --ink:          #11212f;
    --ink-soft:     #41525e;
    --ink-faint:    #7d8993;
    --rule:         #c8bf9f;
    --accent:       #b03a2e;     /* warm red, for "boarding" */
    --accent-soft:  #d6735f;
    --shadow:       0 1px 0 rgba(17,33,47,.08), 0 30px 60px -30px rgba(17,33,47,.25);
  }
  [data-theme="midnight"] {
    --paper:        #0d1117;
    --paper-2:      #131a22;
    --ink:          #e9d9b1;     /* warm cream, like an old annunciator lamp */
    --ink-soft:     #b9a983;
    --ink-faint:    #6f6649;
    --rule:         #2a2a25;
    --accent:       #ff7a59;
    --accent-soft:  #ffb199;
    --shadow:       0 1px 0 rgba(0,0,0,.4), 0 30px 60px -30px rgba(0,0,0,.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    min-height: 100vh;
    transition: background .6s ease, color .6s ease;
  }
  /* paper grain — pure CSS, no images */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(1200px 800px at 50% -20%, rgba(255,255,255,.35), transparent 60%),
      radial-gradient(800px 600px at 100% 100%, rgba(0,0,0,.05), transparent 60%);
    mix-blend-mode: multiply;
    z-index: 0;
  }
  [data-theme="midnight"] body::before,
  body[data-theme="midnight"]::before {
    background:
      radial-gradient(1200px 800px at 50% -20%, rgba(255,200,140,.06), transparent 60%),
      radial-gradient(800px 600px at 100% 100%, rgba(255,150,100,.03), transparent 60%);
  }

  .frame {
    position: relative; z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 56px 40px 80px;
  }
  @media (max-width: 600px) { .frame { padding: 28px 22px 60px; } }

  /* ---------- MASTHEAD ---------- */
  .masthead {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 16px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 6px;
  }
  .masthead .left, .masthead .right {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .masthead .right { justify-content: flex-end; }
  .left-stack {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .live-line {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .updated-line {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-variation-settings: "opsz" 144;
    font-size: clamp(40px, 7vw, 68px);
    letter-spacing: -.02em;
    line-height: 1;
    margin: 0;
    text-align: center;
    font-style: italic;
  }
  .masthead h1 em {
    font-style: normal;
    font-weight: 300;
    color: var(--ink-soft);
  }
  .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(176,58,46,.6); }
    70%  { box-shadow: 0 0 0 10px rgba(176,58,46,0); }
    100% { box-shadow: 0 0 0 0 rgba(176,58,46,0); }
  }
  .subline {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 8px 2px 28px;
    border-bottom: 1px solid var(--rule);
  }

  /* ---------- STATION BLOCK ---------- */
  .station {
    margin-top: 36px;
    opacity: 0;
    transform: translateY(8px);
    animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .station:nth-child(2) { animation-delay: .12s; }
  @keyframes rise {
    to { opacity: 1; transform: none; }
  }

  .station-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .station-name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-variation-settings: "opsz" 144;
    font-size: clamp(26px, 4.5vw, 38px);
    letter-spacing: -.015em;
    line-height: 1.05;
    margin: 0;
  }
  .station-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .station-rule {
    height: 1px;
    background: var(--ink);
    margin-bottom: 4px;
  }
  .station-rule.thin { background: var(--rule); }

  /* ---------- DIRECTION COLUMNS ---------- */
  .directions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--ink);
  }
  .direction {
    min-width: 0;
  }
  .direction + .direction {
    border-left: 1px solid var(--rule);
  }
  .direction-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .direction-header .arrow {
    font-size: 14px;
    color: var(--ink-faint);
  }
  /* On narrow viewports (phones), stack the two columns */
  @media (max-width: 480px) {
    .directions { grid-template-columns: 1fr; }
    .direction + .direction {
      border-left: none;
      border-top: 1px solid var(--rule);
    }
  }

  /* ---------- ARRIVAL ROWS ---------- */
  .row {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 14px 12px;
    border-bottom: 1px solid var(--rule);
    transition: background .2s ease;
  }
  .row:hover { background: rgba(0,0,0,.02); }
  [data-theme="midnight"] .row:hover { background: rgba(255,255,255,.02); }
  .row.boarding .mins { color: var(--accent); }
  .row.boarding .bullet { box-shadow: 0 0 0 3px rgba(176,58,46,.18); }

  .bullet {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: #fff;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 18px;
    font-style: normal;
    letter-spacing: -.02em;
    flex-shrink: 0;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.18);
    position: relative;
  }
  /* Express marker: small "X" tucked into the lower-right corner.
     Sized small + outside the bullet so it doesn't overlap the route letter. */
  .bullet.express::after {
    content: "x";
    position: absolute;
    right: -2px;
    bottom: -2px;
    width: 12px;
    height: 12px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 8px;
    line-height: 12px;
    text-align: center;
    border-radius: 50%;
    border: 1.5px solid var(--paper);
    box-sizing: content-box;
    letter-spacing: 0;
    text-transform: uppercase;
  }
  /* MTA route colors */
  .b-1, .b-2, .b-3        { background: #ee352e; }
  .b-4, .b-5, .b-6        { background: #00933c; }
  .b-7                    { background: #b933ad; }
  .b-A, .b-C, .b-E        { background: #2850ad; }
  .b-B, .b-D, .b-F, .b-M  { background: #ff6319; }
  .b-G                    { background: #6cbe45; }
  .b-J, .b-Z              { background: #996633; }
  .b-L                    { background: #a7a9ac; }
  .b-N, .b-Q, .b-R, .b-W  { background: #fccc0a; color: #11212f; }
  .b-S                    { background: #808183; }

  .destination {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .borough {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(15px, 2.2vw, 19px);
    letter-spacing: -.01em;
    line-height: 1.15;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .terminus {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mins {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: clamp(22px, 3.4vw, 28px);
    letter-spacing: -.02em;
    text-align: right;
    line-height: 1;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    min-width: 60px;
  }
  .mins .unit {
    display: block;
    font-size: 8px;
    letter-spacing: .2em;
    color: var(--ink-faint);
    margin-top: 4px;
    text-transform: uppercase;
    font-weight: 400;
  }
  .mins.now {
    color: var(--accent);
    font-style: italic;
    font-family: 'Fraunces', serif;
    font-weight: 500;
  }

  .empty {
    padding: 24px 4px;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 14px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }

  /* ---------- FOOTER + CONTROLS ---------- */
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 2px solid var(--ink);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .footer-time {
    line-height: 1.5;
    color: var(--ink-soft);
  }
  .footer-time .live {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--ink);
  }
  .footer-center { text-align: center; }
  .style-prefix {
    /* inherits the footer's mono caps treatment */
    color: var(--ink-faint);
  }
  .display-style {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ink-soft);
  }

  /* QR + "Settings" label in the masthead's right column */
  .qr-stack {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .qr-frame {
    width: 56px;
    height: 56px;
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 3px;
    display: grid;
    place-items: center;
    transition: border-color .2s;
  }
  .qr-frame img {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }
  .qr-frame .qr-fallback {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--ink-soft);
  }
  .qr-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-soft);
    transition: color .2s;
  }
  .qr-stack:hover .qr-frame { border-color: var(--ink); }
  .qr-stack:hover .qr-label { color: var(--ink); }
  .settings-label {
    text-align: right;
    cursor: pointer;
    transition: color .2s;
  }
  .settings-label:hover {
    color: var(--ink);
  }

  .controls {
    display: none;
  }

  /* ---------- SETTINGS SHEET ---------- */
  .sheet-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .sheet-bg.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%) scale(.96);
    width: min(440px, calc(100vw - 32px));
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 32px 28px 28px;
    z-index: 101;
    opacity: 0;
    pointer-events: none;
    transition: all .3s cubic-bezier(.2,.7,.2,1);
    box-shadow: var(--shadow);
    max-height: 90vh;
    overflow-y: auto;
  }
  .sheet.open {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .sheet h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 26px;
    margin: 0 0 4px;
    letter-spacing: -.01em;
  }
  .sheet .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 24px;
  }
  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--rule);
    background: var(--paper-2);
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    border-radius: 3px;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--ink);
  }
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--rule);
  }
  .toggle-row:first-of-type { border-top: none; }
  .toggle-row span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .switch {
    width: 40px; height: 22px;
    background: var(--rule);
    border-radius: 22px;
    position: relative;
    cursor: pointer;
    transition: background .2s;
  }
  .switch.on { background: var(--accent); }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: var(--paper);
    border-radius: 50%;
    transition: transform .2s;
  }
  .switch.on::after { transform: translateX(18px); }
  .save-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .2s;
  }
  .save-btn:hover { opacity: .85; }

  .status-bar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .status-bar.warn { color: var(--accent); }
</style>
</head>
<body>

<div id="brightness-overlay" style="position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:9999;transition:opacity .8s ease"></div>

<div class="frame">
  <header class="masthead">
    <div class="left">
      <div class="left-stack">
        <span class="live-line"><span class="pulse"></span><span id="status">LIVE</span></span>
        <span id="updated" class="updated-line">UPDATED —</span>
      </div>
    </div>
    <h1>Subway <em>Departures</em></h1>
    <div class="right">
      <a class="qr-stack" id="qr-stack" href="control.html">
        <span class="qr-frame">
          <img id="qr-img" alt="" />
          <span class="qr-fallback" id="qr-fallback">QR</span>
        </span>
        <span class="qr-label">Settings</span>
      </a>
    </div>
  </header>
  <div class="subline">
    <span id="dateline">—</span>
    <span>96th Street · Upper West Side</span>
    <span></span>
  </div>

  <section class="station" id="station-1">
    <div class="station-header">
      <h2 class="station-name">96<span style="font-size:.6em;vertical-align:super">th</span> Street &nbsp;·&nbsp; <em style="font-style:italic;font-weight:300;color:var(--ink-soft)">Broadway</em></h2>
      <div class="station-meta" id="meta-1">1 · 2 · 3</div>
    </div>
    <div class="station-rule"></div>
    <div class="station-rule thin" style="margin-bottom:8px"></div>
    <div class="directions">
      <div class="direction">
        <div class="direction-header"><span>Uptown</span><span class="arrow">↑</span></div>
        <div id="arrivals-1-N"><div class="empty">Loading…</div></div>
      </div>
      <div class="direction">
        <div class="direction-header"><span>Downtown</span><span class="arrow">↓</span></div>
        <div id="arrivals-1-S"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </section>

  <section class="station" id="station-2">
    <div class="station-header">
      <h2 class="station-name">96<span style="font-size:.6em;vertical-align:super">th</span> Street &nbsp;·&nbsp; <em style="font-style:italic;font-weight:300;color:var(--ink-soft)">Central Park West</em></h2>
      <div class="station-meta" id="meta-2">B · C</div>
    </div>
    <div class="station-rule"></div>
    <div class="station-rule thin" style="margin-bottom:8px"></div>
    <div class="directions">
      <div class="direction">
        <div class="direction-header"><span>Uptown</span><span class="arrow">↑</span></div>
        <div id="arrivals-2-N"><div class="empty">Loading…</div></div>
      </div>
      <div class="direction">
        <div class="direction-header"><span>Downtown</span><span class="arrow">↓</span></div>
        <div id="arrivals-2-S"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <span id="clock">—:—</span>
    <span class="footer-center" id="footer-status">A LIVING SCHEDULE · MTA REAL-TIME</span>
    <span><span class="style-prefix">Style:</span> <span class="display-style">Broadsheet</span></span>
  </footer>
</div>

<script>
/* ----------------------------------------------------------------
   Subway Departures Board
   Data source: goodservice.io public API (used by Subway Now lite).
   Falls back through corsproxy.io if direct CORS fails.
   Falls back to demo data if both fail (so the board always looks alive).
---------------------------------------------------------------- */

const config = {
  stations: [
    { id: '120', name: '96th Street', sub: 'Broadway',          slot: 1 },
    { id: 'A14', name: '96th Street', sub: 'Central Park West', slot: 2 },
  ],
  apiUrl: localStorage.getItem('subway-api-url') || 'https://subway-board-api.jared-b-sampson.workers.dev',
  controlUrl: localStorage.getItem('subway-control-url') || '',
  showClock: false,
  demo: false,
};

// ---------- destination labelling: minimal lookup of common UWS terminals ----------
const TERMINUS = {
  // 1 train
  '101': { borough: 'The Bronx',  name: 'Van Cortlandt Pk–242 St' },
  '142': { borough: 'Manhattan',  name: 'South Ferry' },
  // 2 train
  '201': { borough: 'The Bronx',  name: 'Wakefield–241 St' },
  '247': { borough: 'Brooklyn',   name: 'Flatbush Av' },
  // 3 train
  '301': { borough: 'Harlem',     name: '148 St' },
  '257': { borough: 'Brooklyn',   name: 'New Lots Av' },
  // B
  'D01': { borough: 'The Bronx',  name: 'Bedford Park Bd' },
  'D03': { borough: 'The Bronx',  name: 'Norwood–205 St' },
  'D43': { borough: 'Brooklyn',   name: 'Brighton Beach' },
  // C
  'A09': { borough: 'Manhattan',  name: '168 St–Washington Hts' },
  'A02': { borough: 'Manhattan',  name: 'Inwood–207 St' },
  'A55': { borough: 'Brooklyn',   name: 'Euclid Av' },
};

function destFor(routeId, stopId) {
  if (TERMINUS[stopId]) return TERMINUS[stopId];
  // sensible guess by direction letter
  const dir = stopId.endsWith('N') ? 'N' : stopId.endsWith('S') ? 'S' : null;
  if (dir === 'N') return { borough: 'Uptown',   name: routeId + ' train' };
  if (dir === 'S') return { borough: 'Downtown', name: routeId + ' train' };
  return { borough: '—', name: routeId + ' train' };
}

// ---------- demo data so the board never looks empty ----------
function demoData(stopId) {
  const now = Date.now();
  const m = (n) => now + n * 60 * 1000;
  if (stopId === '120') return [
    { route_id: '1', stop_id: '120N', estimated_current_stop_arrival_time: m(2) },
    { route_id: '2', stop_id: '120N', estimated_current_stop_arrival_time: m(5) },
    { route_id: '3', stop_id: '120N', estimated_current_stop_arrival_time: m(11) },
    { route_id: '1', stop_id: '120N', estimated_current_stop_arrival_time: m(16) },
    { route_id: '1', stop_id: '120S', estimated_current_stop_arrival_time: m(3) },
    { route_id: '2', stop_id: '120S', estimated_current_stop_arrival_time: m(7) },
    { route_id: '3', stop_id: '120S', estimated_current_stop_arrival_time: m(12) },
    { route_id: '1', stop_id: '120S', estimated_current_stop_arrival_time: m(18) },
  ];
  if (stopId === 'A14') return [
    { route_id: 'C', stop_id: 'A14N', estimated_current_stop_arrival_time: m(3) },
    { route_id: 'B', stop_id: 'A14N', estimated_current_stop_arrival_time: m(6) },
    { route_id: 'C', stop_id: 'A14N', estimated_current_stop_arrival_time: m(13) },
    { route_id: 'B', stop_id: 'A14N', estimated_current_stop_arrival_time: m(19) },
    { route_id: 'C', stop_id: 'A14S', estimated_current_stop_arrival_time: m(4) },
    { route_id: 'B', stop_id: 'A14S', estimated_current_stop_arrival_time: m(9) },
    { route_id: 'C', stop_id: 'A14S', estimated_current_stop_arrival_time: m(15) },
    { route_id: 'B', stop_id: 'A14S', estimated_current_stop_arrival_time: m(21) },
  ];
  return [];
}

// ---------- fetch ----------
async function fetchAllArrivals() {
  if (config.demo) {
    const r = {};
    config.stations.forEach(s => r[s.id] = demoData(s.id).map(x => ({
      route: x.route_id,
      direction: x.stop_id.endsWith('N') ? 'N' : 'S',
      stop_id: x.stop_id,
      destination: (TERMINUS[x.stop_id] || destFor(x.route_id, x.stop_id).name),
      arrival: Math.floor(x.estimated_current_stop_arrival_time / 1000),
    })));
    return r;
  }
  if (!config.apiUrl) {
    setStatus('NO API · DEMO', true);
    config.demo = true;
    return fetchAllArrivals();
  }
  try {
    const ids = config.stations.map(s => s.id).join(',');
    const url = config.apiUrl.replace(/\/+$/, '') + '/?stops=' + encodeURIComponent(ids);
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    return data.stops || {};
  } catch (e) {
    setStatus('OFFLINE · DEMO', true);
    const r = {};
    config.stations.forEach(s => r[s.id] = demoData(s.id).map(x => ({
      route: x.route_id,
      direction: x.stop_id.endsWith('N') ? 'N' : 'S',
      stop_id: x.stop_id,
      destination: (TERMINUS[x.stop_id] || destFor(x.route_id, x.stop_id).name),
      arrival: Math.floor(x.estimated_current_stop_arrival_time / 1000),
    })));
    return r;
  }
}

// ---------- render ----------
function fmtMins(ts) {
  const diff = (ts - Date.now()) / 60000;
  if (diff < 0.5) return { text: 'now', html: '<span class="mins now">now<span class="unit">arriving</span></span>' };
  const mins = Math.round(diff);
  return { text: mins + 'm', html: `<span class="mins">${mins}<span class="unit">${mins===1?'minute':'minutes'}</span></span>` };
}
function fmtClock(ts) {
  const d = new Date(ts);
  const h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = ((h + 11) % 12) + 1;
  return `<span class="mins">${hh}:${m.toString().padStart(2,'0')}<span class="unit">${ampm}</span></span>`;
}

// Routes that run express (NYC subway). The 1 is local; 2 and 3 are express.
// 4/5 are express, 6 is local. A and D are express on 8th Av/Concourse.
// Note: the B is express on Central Park West below 145 St, but at 96 St CPW it
// stops as a local — so we exclude it here for this user's stations.
const EXPRESS = new Set(['2','3','4','5','A','D','N']);

function renderRow(a) {
  const arrMs = a.arrival * 1000;
  const minsTxt = (arrMs - Date.now()) / 60000;
  const boarding = minsTxt < 1 ? ' boarding' : '';
  const minsHtml = config.showClock ? fmtClock(arrMs) : fmtMins(arrMs).html;
  const expressClass = EXPRESS.has(a.route) ? ' express' : '';
  return `
    <div class="row${boarding}">
      <div class="bullet b-${a.route}${expressClass}">${a.route}</div>
      <div class="destination">
        <div class="borough">${a.destination || '—'}</div>
        <div class="terminus">${a.route} train</div>
      </div>
      ${minsHtml}
    </div>
  `;
}

function renderArrivals(slot, arrivals) {
  const targetN = document.getElementById('arrivals-' + slot + '-N');
  const targetS = document.getElementById('arrivals-' + slot + '-S');
  if (!arrivals) arrivals = [];
  arrivals.sort((a,b) => a.arrival - b.arrival);

  const northbound = arrivals.filter(a => a.direction === 'N').slice(0, 4);
  const southbound = arrivals.filter(a => a.direction === 'S').slice(0, 4);

  targetN.innerHTML = northbound.length
    ? northbound.map(renderRow).join('')
    : '<div class="empty">No upcoming trains.</div>';
  targetS.innerHTML = southbound.length
    ? southbound.map(renderRow).join('')
    : '<div class="empty">No upcoming trains.</div>';
}

// ---------- chrome ----------
function setStatus(t, warn) {
  const s = document.getElementById('status');
  const f = document.getElementById('footer-status');
  s.textContent = t;
  f.textContent = warn ? 'CONNECTION OFFLINE · SHOWING DEMO DATA' : 'A LIVING SCHEDULE · MTA REAL-TIME';
  f.classList.toggle('warn', !!warn);
}
function tickClock() {
  const d = new Date();
  const h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = ((h + 11) % 12) + 1;
  document.getElementById('clock').textContent =
    `${hh}:${m.toString().padStart(2,'0')} ${ampm}`;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('dateline').textContent =
    `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}

async function refresh() {
  const all = await fetchAllArrivals();
  config.stations.forEach(st => renderArrivals(st.slot, all[st.id] || []));
  const t = new Date();
  document.getElementById('updated').textContent =
    `UPDATED ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
  if (!config.demo) setStatus('LIVE', false);
}

function getControlUrl() {
  if (config.controlUrl) return config.controlUrl;
  // Fallback: resolve relative to the current page so the QR works for whoever scans it.
  return new URL('control.html', location.href).toString();
}
function updateQR() {
  const url = getControlUrl();
  const stack = document.getElementById('qr-stack');
  const img = document.getElementById('qr-img');
  const fallback = document.getElementById('qr-fallback');
  if (stack) stack.href = url;
  if (!img) return;
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=2&data=${encodeURIComponent(url)}`;
  img.onload  = () => { if (fallback) fallback.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none'; if (fallback) fallback.style.display = ''; };
  img.src = qrSrc;
}

// ---------- station headers (rendered from config.stations) ----------
function updateStationHeaders() {
  ['station-1','station-2'].forEach((sid, i) => {
    const s = config.stations[i];
    if (!s) return;
    const el = document.querySelector(`#${sid} .station-name`);
    if (el) {
      el.innerHTML = `${s.name} &nbsp;·&nbsp; <em style="font-style:italic;font-weight:300;color:var(--ink-soft)">${s.sub}</em>`;
    }
  });
}

// ---------- pull saved settings from localStorage ----------
function loadLocalConfig() {
  try {
    const stations = JSON.parse(localStorage.getItem('subway-stations') || 'null');
    if (stations && Array.isArray(stations) && stations.length === 2) {
      config.stations = stations;
    }
  } catch {}
  config.showClock = localStorage.getItem('subway-show-clock') === '1';
  const savedApi = localStorage.getItem('subway-api-url');
  if (savedApi) config.apiUrl = savedApi;
  config.controlUrl = localStorage.getItem('subway-control-url') || '';
}

loadLocalConfig();
updateStationHeaders();

// ---------- live sync: react to settings changes from another tab/page ----------
window.addEventListener('storage', (e) => {
  if (!['subway-stations','subway-show-clock','subway-api-url','subway-control-url'].includes(e.key)) return;
  loadLocalConfig();
  updateStationHeaders();
  updateQR();
  refresh();
});

// ---------- boot ----------
tickClock();
setInterval(tickClock, 1000);
updateQR();
refresh();
setInterval(refresh, 30000);  // every 30s, like the real countdown clocks
// ---------- remote settings polling (brightness / theme / schedule) ----------
const overlay = document.getElementById('brightness-overlay');

function applyBrightness(pct) {
  // pct 100 = no overlay, pct 10 = 90% black overlay
  const dim = Math.max(0, Math.min(0.9, (100 - pct) / 100));
  overlay.style.opacity = dim;
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = (theme === 'midnight') ? 'midnight' : '';
}

// Compute the current "intended" brightness given the schedule.
// Schedule is a simple two-point step: bright between brightAt and dimAt, dim otherwise.
function brightnessFromSchedule(schedule, manualBrightness) {
  if (!schedule || !schedule.enabled) return manualBrightness;
  const now = new Date();
  const minsNow = now.getHours() * 60 + now.getMinutes();
  const parse = (t) => {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  };
  const dimAt = parse(schedule.dimAt);
  const brightAt = parse(schedule.brightAt);
  // "bright window" runs from brightAt (inclusive) to dimAt (exclusive)
  const inBrightWindow = brightAt < dimAt
    ? (minsNow >= brightAt && minsNow < dimAt)
    : (minsNow >= brightAt || minsNow < dimAt);  // crosses midnight
  // In the bright window, defer to the manual slider so the user can dim during the day.
  // In the dim window, force the scheduled dim level (auto-dim at night).
  return inBrightWindow ? manualBrightness : schedule.dimTo;
}

async function pollSettings() {
  if (!config.apiUrl) return;
  try {
    const r = await fetch(config.apiUrl.replace(/\/+$/, '') + '/brightness', { cache: 'no-store' });
    if (!r.ok) return;
    const s = await r.json();
    const target = brightnessFromSchedule(s.schedule, s.brightness);
    applyBrightness(target);
    applyTheme(s.theme);
  } catch {}
}

// Poll on a short interval so phone changes feel near-instant.
pollSettings();
setInterval(pollSettings, 5_000);
// Also re-evaluate the schedule every minute (so dimming kicks in on time even if no phone activity)
setInterval(pollSettings, 60_000);
</script>
